<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Simulator</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <header class="bg-slate-900 border-b border-slate-800 px-8 py-4">
    <div class="flex items-center justify-between max-w-7xl mx-auto">
      <div class="flex items-center gap-3">
        <span class="text-indigo-500 font-bold tracking-tight">Job Simulator</span>
        <span class="text-slate-700">/</span>
        <span class="text-slate-400 text-sm uppercase tracking-widest" id="resource-label"></span>
      </div>
      <a href="create.html" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-medium px-4 py-2 rounded-lg transition-colors">
        + Nuevo registro
      </a>
    </div>
  </header>

  <main class="max-w-7xl mx-auto px-8 py-10">
    <div id="error" class="hidden mb-6 bg-red-950 border border-red-800 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full text-sm">
          <thead>
            <tr class="bg-slate-800/60 text-slate-400 text-xs uppercase tracking-wider">
              <th class="px-6 py-4 text-left font-medium">ID</th>
              <th class="px-6 py-4 text-left font-medium">Nombre</th>
              <th class="px-6 py-4 text-left font-medium">Color</th>
              <th class="px-6 py-4 text-left font-medium">Marca</th>
              <th class="px-6 py-4 text-left font-medium">Número</th>
              <th class="px-6 py-4 text-left font-medium">Velociadad máxima</th>
              <th class="px-6 py-4 text-left font-medium">¿Compite?</th>
              <th class="px-6 py-4 text-right font-medium">Acciones</th>
            </tr>
          </thead>
          <tbody id="records" class="divide-y divide-slate-800/60"></tbody>
        </table>
      </div>
      <div id="empty" class="hidden text-center py-20 text-slate-600">
        No hay registros.
        <a href="create.html" class="text-indigo-500 hover:text-indigo-400 ml-1">Crear el primero.</a>
      </div>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script type="module" src="js/index.js"></script>
</body>
</html>
