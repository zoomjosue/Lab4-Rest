<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Job Simulator — Nuevo registro</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-950 text-slate-100 min-h-screen">

  <header class="bg-slate-900 border-b border-slate-800 px-8 py-4">
    <div class="flex items-center gap-3 max-w-3xl mx-auto">
      <a href="index.html" class="text-slate-500 hover:text-slate-300 transition-colors text-sm">← Volver</a>
      <span class="text-slate-700">/</span>
      <span class="text-indigo-500 font-bold tracking-tight">Job Simulator</span>
      <span class="text-slate-700">/</span>
      <span class="text-slate-400 text-sm">Nuevo registro</span>
    </div>
  </header>

  <main class="max-w-3xl mx-auto px-8 py-10">
    <div id="error" class="hidden mb-6 bg-red-950 border border-red-800 text-red-400 px-4 py-3 rounded-lg text-sm"></div>

    <div class="bg-slate-900 border border-slate-800 rounded-xl p-8">
      <h1 class="text-lg font-semibold mb-8">Nuevo registro</h1>

      <form id="form" class="space-y-6" novalidate>
        <div class="grid grid-cols-2 gap-6">

          <div class="flex flex-col gap-2">
            <label class="text-xs text-slate-500 uppercase tracking-wider">Nombre <span class="text-slate-600">string</span></label>
            <input name="campo1" type="text" required
              class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-colors placeholder-slate-600"
              placeholder="string">
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs text-slate-500 uppercase tracking-wider">Color <span class="text-slate-600">string</span></label>
            <input name="campo2" type="text" required
              class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-colors placeholder-slate-600"
              placeholder="string">
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs text-slate-500 uppercase tracking-wider">Marca <span class="text-slate-600">string</span></label>
            <input name="campo3" type="text" required
              class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-colors placeholder-slate-600"
              placeholder="string">
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs text-slate-500 uppercase tracking-wider">Número <span class="text-slate-600">integer</span></label>
            <input name="campo4" type="number" step="1" required
              class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-colors placeholder-slate-600"
              placeholder="integer">
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs text-slate-500 uppercase tracking-wider">Velocidad máxima <span class="text-slate-600">float</span></label>
            <input name="campo5" type="number" step="0.01" required
              class="bg-slate-800 border border-slate-700 rounded-lg px-4 py-2.5 text-sm text-slate-100 focus:outline-none focus:border-indigo-500 transition-colors placeholder-slate-600"
              placeholder="float">
          </div>

          <div class="flex flex-col gap-2">
            <label class="text-xs text-slate-500 uppercase tracking-wider">¿Compite? <span class="text-slate-600">boolean</span></label>
            <div class="flex items-center h-10">
              <input name="campo6" type="checkbox"
                class="w-4 h-4 rounded border-slate-600 bg-slate-800 text-indigo-500 focus:ring-indigo-500 focus:ring-offset-slate-900 cursor-pointer">
            </div>
          </div>

        </div>

        <div class="flex gap-3 pt-2">
          <button id="submit-btn" type="submit"
            class="bg-indigo-600 hover:bg-indigo-500 disabled:opacity-50 disabled:cursor-not-allowed text-white text-sm font-medium px-6 py-2.5 rounded-lg transition-colors">
            Crear registro
          </button>
          <a href="index.html"
            class="bg-slate-800 hover:bg-slate-700 text-slate-300 text-sm font-medium px-6 py-2.5 rounded-lg transition-colors">
            Cancelar
          </a>
        </div>
      </form>
    </div>
  </main>

  <script src="js/config.js"></script>
  <script type="module" src="js/create.js"></script>
</body>
</html>
